<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주변 극장/영화관 찾기</title>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; }

        /* 화면 2분할 레이아웃 */
        .container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 */
        #sidebar {
            width: 350px; height: 100%; background: #f8f9fa;
            display: flex; flex-direction: column; border-right: 1px solid #ddd; z-index: 10;
        }

        /* 탭 메뉴 스타일 */
        .tab-container { display: flex; background: #fff; border-bottom: 1px solid #eee; }
        .tab-btn {
            flex: 1; padding: 15px; border: none; background: #f1f1f1;
            font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: #fee500; color: #000; }

        #resultList { flex: 1; overflow-y: auto; list-style: none; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; background: #fff; }
        .item:hover { background: #f0f0f0; }
        .item h5 { color: #333; margin-bottom: 5px; font-size: 15px; }
        .item span { display: block; font-size: 13px; color: #666; margin-top: 2px; }
        .item .tel { color: #008bcc; }

        /* 오른쪽 지도 영역 */
        #map { flex: 1; height: 100%; }

        /* 정보창(팝업) 스타일 보정 */
        .info-popup { padding: 10px; min-width: 220px; font-family: sans-serif; }
        .info-popup h4 { font-size: 14px; margin-bottom: 6px; color: #333; }
        .info-popup p { font-size: 12px; color: #666; margin-bottom: 8px; line-height: 1.4; }
        .info-popup .links { display: flex; gap: 8px; border-top: 1px solid #eee; padding-top: 6px; }
        .info-popup .links a {
            font-size: 11px; color: #fff; background: #555; padding: 4px 8px;
            text-decoration: none; border-radius: 3px; font-weight: bold;
        }
        .info-popup .links a.roadview { background: #008bcc; }
        .info-popup .links a.detail { background: #ea4335; }
    </style>
</head>
<body>

<div class="container">
    <div id="sidebar">
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('극장', this)">극장/공연장</button>
            <button class="tab-btn" onclick="switchTab('영화관', this)">영화관</button>
        </div>
        <ul id="resultList"></ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5c07c3fbfa3a5b6d10da29953b038d07&libraries=services"></script>

<script>
    let map;
    let ps; 
    let infowindow; 
    let markers = []; // 기존 마커 지우기용 배열
    let currentCategoryKeyword = '극장'; // 기본 선택값

    window.onload = function() {
        initMap();
    };

    function initMap() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 서울시청 기본
            level: 4
        };

        map = new kakao.maps.Map(container, options);
        ps = new kakao.maps.services.Places(); 
        // 주위에 빈 곳을 누르면 정보창이 닫히도록 removable: true 설정
        infowindow = new kakao.maps.InfoWindow({zIndex:1, removable: true});

        // 현재 위치 가져오기 및 첫 검색 실행
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                map.setCenter(locPosition);
                searchPlaces(); // 위치를 잡은 후 주변 검색 실행
            }, function() {
                searchPlaces(); // 위치 승인 거부 시 기본 중심값으로 검색
            });
        } else {
            searchPlaces();
        }
    }

    // 탭 전환 함수
    function switchTab(keyword, button) {
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');

        currentCategoryKeyword = keyword;
        searchPlaces(); // 탭 변경 시 즉시 재검색
    }

    // 주변 장소 검색 함수
    function searchPlaces() {
        removeMarkers(); // 1. 새로 검색할 때 기존 마커 지우기

        // 현재 지도 중심 기준으로 문화시설(CT1) 카테고리 안에서 '극장' 혹은 '영화관' 검색
        ps.keywordSearch(currentCategoryKeyword, placesSearchCB, {
            location: map.getCenter(),
            radius: 5000,
            category_group_code: 'CT1' 
        });
    }

    function placesSearchCB(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data); 
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            document.getElementById('resultList').innerHTML = '<li style="padding:20px; text-align:center; color:#999;">주변에 결과가 없습니다.</li>';
        } else {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 결과 표시 (리스트 + 마커)
    function displayPlaces(places) {
        const listEl = document.getElementById('resultList');
        const bounds = new kakao.maps.LatLngBounds();
        
        listEl.innerHTML = ''; 

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            // 안정적인 기본 이미지 마커로 변경 (터치 및 확대 오류 완전 해결!)
            const marker = addMarker(placePosition, places[i]);
            const itemEl = getListItem(i, places[i]); 

            bounds.extend(placePosition);

            // 왼쪽 리스트 아이템 클릭 시
            itemEl.onclick = function() {
                displayInfowindow(marker, places[i]);
                map.panTo(placePosition);
            };

            listEl.appendChild(itemEl);
        }
        
        map.setBounds(bounds); 
    }

    // 기본 마커 생성 및 클릭 이벤트 연결
    function addMarker(position, place) {
        const marker = new kakao.maps.Marker({
            position: position,
            map: map
        });

        // [해결] 마커 클릭 시 팝업 표시 이벤트 등록
        kakao.maps.event.addListener(marker, 'click', function() {
            displayInfowindow(marker, place);
        });

        markers.push(marker); // 배열에 저장하여 추후 삭제 가능하게 함
        return marker;
    }

    // 기존 마커 전체 지우기 함수
    function removeMarkers() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
    }

    // 팝업(정보창) 표시 함수 - 로드뷰 및 영업시간(상세페이지) 링크 추가
    function displayInfowindow(marker, place) {
        const address = place.road_address_name || place.address_name;
        
        // 카카오맵에서 제공하는 공식 상세페이지 및 로드뷰 URL 활용
        const detailUrl = `https://place.map.kakao.com/${place.id}`;
        const roadviewUrl = `https://map.kakao.com/link/roadview/${place.y},${place.x}`;

        const content = `
            <div class="info-popup">
                <h4>${place.place_name}</h4>
                <p>${address}</p>
                <div class="links">
                    <a href="${roadviewUrl}" target="_blank" class="roadview">🗺️ 로드뷰</a>
                    <a href="${detailUrl}" target="_blank" class="detail">ℹ️ 영업시간/상세</a>
                </div>
            </div>
        `;
        
        infowindow.setContent(content);
        infowindow.open(map, marker);
    }

    // 리스트 HTML 구조 생성
    function getListItem(index, place) {
        const el = document.createElement('li');
        const address = place.road_address_name || place.address_name;
        
        el.innerHTML = `
            <div class="item">
                <h5>${index + 1}. ${place.place_name}</h5>
                <span>${address}</span>
                ${place.phone ? `<span class="tel">${place.phone}</span>` : ''}
            </div>
        `;
        return el;
    }
</script>

</body>
</html>
