<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주변 공연장 찾기 🖤</title>
    <style>
        /* 기본 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; }
        .container { display: flex; width: 100%; height: 100vh; }

        /* 사이드바 스타일 */
        #sidebar {
            width: 350px; height: 100%; background: #fff;
            display: flex; flex-direction: column; border-right: 1px solid #ddd; z-index: 10;
        }
        .search-box { padding: 20px; border-bottom: 2px solid #fee500; }
        .search-box input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .search-box button { width: 25%; padding: 10px; background: #fee500; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }

        #resultList { flex: 1; overflow-y: auto; list-style: none; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .item:hover { background: #fff9c4; }
        .item h5 { color: #333; margin-bottom: 5px; font-size: 16px; }
        .item p { font-size: 13px; color: #666; margin-top: 4px; }

        /* 🖤 이모지 마커 커스텀 스타일 */
        .emoji-marker {
            font-size: 30px;
            cursor: pointer;
            transform: translate(-50%, -100%); /* 중심점 맞추기 */
        }

        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div id="sidebar">
        <div class="search-box">
            <input type="text" id="keyword" placeholder="극장, 영화관 입력" onkeypress="if(event.keyCode==13) searchPlaces()">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <ul id="resultList"></ul>
    </div>
    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5c07c3fbfa3a5b6d10da29953b038d07&libraries=services"></script>

<script>
    let map;
    let ps; 
    let infowindow;
    let markers = []; // 생성된 마커(커스텀 오버레이)를 담을 배열

    window.onload = function() {
        initMap();
    };

    function initMap() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567),
            level: 4
        };

        map = new kakao.maps.Map(container, options);
        ps = new kakao.maps.services.Places(); 
        infowindow = new kakao.maps.InfoWindow({zIndex:1, removable: true});

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                map.setCenter(locPosition);
            });
        }
    }

    // 1. 키워드 검색 실행
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.trim()) {
            alert('검색어를 입력해주세요!');
            return;
        }

        // 기존에 지도에 표시된 마커 제거
        removeMarkers();

        // 주변 검색 (현재 지도 중심 기준)
        ps.keywordSearch(keyword, placesSearchCB, {
            location: map.getCenter(),
            radius: 5000 // 5km 반경
        });
    }

    function placesSearchCB(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('주변에 결과가 없습니다.');
        } else {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 2. 검색 결과 리스트 & 이모지 마커 표시
    function displayPlaces(places) {
        const listEl = document.getElementById('resultList');
        const bounds = new kakao.maps.LatLngBounds();
        listEl.innerHTML = ''; 

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            // 🖤 이모지 마커(CustomOverlay) 추가
            const marker = addEmojiMarker(placePosition, places[i]);
            const itemEl = getListItem(i, places[i]);

            bounds.extend(placePosition);

            // 리스트 아이템 클릭 시
            itemEl.onclick = function() {
                displayInfowindow(marker, places[i]);
                map.panTo(placePosition);
            };

            listEl.appendChild(itemEl);
        }
        map.setBounds(bounds);
    }

    // 3. 🖤 이모지 마커 생성 함수
    function addEmojiMarker(position, place) {
        const content = document.createElement('div');
        content.className = 'emoji-marker';
        content.innerHTML = '🖤';
        
        // 클릭 시 정보창 표시
        content.onclick = function() {
            displayInfowindow(customOverlay, place);
        };

        const customOverlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content,
            clickable: true
        });

        customOverlay.setMap(map);
        markers.push(customOverlay); // 나중에 지우기 위해 배열에 저장
        return customOverlay;
    }

    // 4. 마커 초기화 함수
    function removeMarkers() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
    }

    // 5. 이름·주소 팝업(정보창) 표시
    function displayInfowindow(marker, place) {
        const content = `
            <div style="padding:10px; min-width:180px; font-size:13px;">
                <strong style="display:block; margin-bottom:4px; color:#333;">${place.place_name}</strong>
                <span style="color:#666;">${place.road_address_name || place.address_name}</span>
            </div>
        `;
        infowindow.setContent(content);
        // CustomOverlay는 일반 Marker와 여백이 다르므로 조절이 필요할 수 있음
        infowindow.open(map, marker);
    }

    // 리스트 아이템 생성 도움 함수
    function getListItem(index, place) {
        const el = document.createElement('li');
        el.innerHTML = `
            <div class="item">
                <h5>${index + 1}. ${place.place_name}</h5>
                <p>${place.road_address_name || place.address_name}</p>
            </div>
        `;
        return el;
    }
</script>
</body>
</html>
