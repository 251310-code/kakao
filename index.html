<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Map Place Search</title>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; }

        /* 화면 2분할 레이아웃 */
        .container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 (검색창 + 리스트) */
        #sidebar {
            width: 350px;
            height: 100%;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 10;
        }

        .search-box { padding: 20px; background: #fff; border-bottom: 1px solid #eee; }
        .search-box input { width: 70%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .search-box button { width: 25%; padding: 8px; background: #fee500; border: none; cursor: pointer; border-radius: 4px; }

        #resultList { flex: 1; overflow-y: auto; list-style: none; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .item:hover { background: #f0f0f0; }
        .item h5 { color: #333; margin-bottom: 5px; }

        /* 오른쪽 지도 영역 */
        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div id="sidebar">
        <div class="search-box">
            <input type="text" id="keyword" placeholder="장소를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <ul id="resultList"></ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5c07c3fbfa3a5b6d10da29953b038d07&libraries=services"></script>

<script>
    // 전역 변수 설정
    let map;
    let ps; // 장소 검색 서비스 객체
    let infowindow; // 검색 결과 클릭 시 띄울 정보창

    // 페이지 로드 시 실행
    window.onload = function() {
        initMap();
    };

    function initMap() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 좌표 (서울시청)
            level: 5 // 확대 레벨 5
        };

        map = new kakao.maps.Map(container, options);
        ps = new kakao.maps.services.Places(); 
        infowindow = new kakao.maps.InfoWindow({zIndex:1});

        // 사용자의 현재 위치 가져오기
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const locPosition = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(locPosition); // 현재 위치로 중심 이동
            });
        }
    }

    // 키워드 검색 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return;
        }

        // 장소 검색 서비스 실행
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 장소 검색 완료 시 호출되는 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data); // 검색 리스트 표시
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 검색 결과 리스트와 마커 표시
    function displayPlaces(places) {
        const listEl = document.getElementById('resultList');
        const bounds = new kakao.maps.LatLngBounds();
        
        listEl.innerHTML = ''; // 리스트 초기화

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const marker = addMarker(placePosition);
            const itemEl = getListItem(i, places[i]); // 리스트 아이템 생성

            bounds.extend(placePosition);

            // 리스트 아이템 클릭 시 지도 이동 및 정보창 표시
            itemEl.onclick = function() {
                displayInfowindow(marker, places[i].place_name);
                map.panTo(placePosition);
            };

            listEl.appendChild(itemEl);
        }
        
        map.setBounds(bounds); // 검색된 장소들이 모두 보이도록 지도 범위 재설정
    }

    // 마커 생성 함수
    function addMarker(position) {
        const marker = new kakao.maps.Marker({
            position: position,
            map: map
        });
        return marker;
    }

    // 정보창 표시 함수
    function displayInfowindow(marker, title) {
        const content = '<div style="padding:5px;z-index:1;">' + title + '</div>';
        infowindow.setContent(content);
        infowindow.open(map, marker);
    }

    // 검색 결과 항목을 HTML 구조로 만드는 함수
    function getListItem(index, places) {
        const el = document.createElement('li');
        let itemStr = '<div class="item">' +
                      '   <h5>' + (index + 1) + '. ' + places.place_name + '</h5>';

        if (places.road_address_name) {
            itemStr += '    <span>' + places.road_address_name + '</span>' +
                       '    <span class="jibun gray">' +  places.address_name  + '</span>';
        } else {
            itemStr += '    <span>' +  places.address_name  + '</span>'; 
        }

        itemStr += '  <span class="tel">' + places.phone  + '</span>' +
                   '</div>';

        el.innerHTML = itemStr;
        return el;
    }
</script>

</body>
</html>
